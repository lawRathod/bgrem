<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#1f7a51" />
        <link rel="manifest" href="/manifest.webmanifest" />
        <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
        <title>Background Mask Generator</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <main class="shell">
            <section class="panel">
                <header class="panel-header">
                    <p class="eyebrow">In-browser segmentation</p>
                    <h1>
                        Generate a clean <code>mask.png</code> from any photo.
                    </h1>
                    <p class="subhead">
                        Upload or paste an image URL, run the model fully
                        client-side, then compare original and mask side by
                        side.
                    </p>
                </header>

                <div
                    class="net-led"
                    id="networkLed"
                    data-state="online"
                    role="status"
                    aria-live="polite"
                >
                    <span class="dot" aria-hidden="true"></span>
                    <span class="label">Network: online</span>
                </div>

                <div class="controls">
                    <label class="file-input">
                        <span>Choose image</span>
                        <input id="imageInput" type="file" accept="image/*" />
                    </label>
                    <div class="url-loader">
                        <input
                            id="imageUrlInput"
                            type="url"
                            inputmode="url"
                            placeholder="https://example.com/photo.jpg"
                        />
                        <button
                            id="loadUrlButton"
                            type="button"
                            class="secondary"
                        >
                            Load URL
                        </button>
                    </div>
                    <label class="model-selector">
                        <span>Model</span>
                        <select id="modelSelect"></select>
                    </label>
                    <button id="generateButton" type="button">
                        Generate mask
                    </button>
                    <a
                        id="downloadMask"
                        class="download hidden"
                        download="mask.png"
                        >Download mask.png</a
                    >
                </div>

                <p id="status" class="status">Select an image to begin.</p>
                <p id="modelInfo" class="model-info" aria-live="polite"></p>
            </section>

            <section id="previewSection" class="preview-grid hidden">
                <article id="sourceCard" class="preview-card hidden">
                    <h2>Original</h2>
                    <img
                        id="sourcePreview"
                        class="preview-image"
                        alt="Selected image preview"
                    />
                </article>
                <article id="maskCard" class="preview-card hidden">
                    <h2>Mask</h2>
                    <img
                        id="maskPreview"
                        class="preview-image"
                        alt="Generated mask preview"
                    />
                </article>
            </section>
        </main>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
